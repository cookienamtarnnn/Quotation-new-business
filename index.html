<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheetech Quotation Generator</title>
<style>
:root{
 --primary:#1CB078;
 --primary-dark:#128A5F;
 --light:#DEFAEF;
 --text:#1F2937;
}
*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{background:#f7fcf9;margin:0;padding:20px;color:var(--text)}
.container{max-width:1200px;margin:auto}
.card{background:#fff;border:1px solid #d8f2e6;border-radius:12px;padding:20px;margin-bottom:20px}
h1{color:var(--primary-dark)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,textarea{width:100%;padding:10px;border:1px solid #cde9dc;border-radius:8px}
button{background:var(--primary);color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse}
#pdf table{
 width:100%;
 border-collapse:collapse;
 table-layout:fixed;
}
.pdf-item-table{
 height:auto;
}
.pdf-page + .pdf-page{
 page-break-before:always;
}
.terms-sign{
 page-break-inside:avoid;
 break-inside:avoid;
}
th{background:var(--primary);color:white;padding:10px}
td{padding:8px;border-bottom:1px solid #e6f4ed}
tbody tr{background:var(--light)}
.totalbox{text-align:right;font-weight:bold;font-size:18px}
#pdf{display:none;background:white;padding:40px}
.logo{max-height:90px}
.summary td{font-weight:bold}
@media print{
 body>*:not(#pdf){display:none!important}
 #pdf{display:block!important}
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>CHEETECH Quotation Generator</h1>
<p>Replace <b>cheetech-logo.png</b> with your official transparent logo.</p>
</div>

<div class="card">
<div class="grid">
<input id="customer" placeholder="Customer Name">
<input id="company" placeholder="Company">
<input id="phone" placeholder="Phone" inputmode="numeric" maxlength="12">
<input id="taxid" placeholder="Tax ID" inputmode="numeric" maxlength="13">
</div>
<br>
<textarea id="address" rows="3" placeholder="Address"></textarea>
</div>

<div class="card">
<table id="tbl">
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Unit Price</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
<br>
<button onclick="addRow()">Add Row</button>

<table class="summary" style="margin-top:20px">
<tr><td>Subtotal</td><td id="subtotal">฿0.00</td></tr>
<tr><td>VAT 7%</td><td id="vat">฿0.00</td></tr>
<tr><td>Grand Total</td><td id="grand">฿0.00</td></tr>
</table>
<br>
<button onclick="preview()">Preview / Print PDF</button>
</div>
</div>

<div id="pdf">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div>
<img src="cheetech-logo.png" class="logo">
</div>
<div style="text-align:right">
<h2 style="color:#1CB078;margin-bottom:15px">
QUOTATION
</h2>

<div style="line-height:1.8">
Viranya,<br>
Kingkaew 29<br>
Samut Prakarn 10540<br>

<a
href="mailto:Cheetechlogistics@gmail.com"
style="color:#1CB078"
>
Cheetechlogistics@gmail.com
</a>
</div>

<br>

<div id="qno"></div>
</div>
</div>

<hr style="border:2px solid #1CB078">

<h3>Customer Information</h3>
<div id="custinfo"></div>

<div id="pdfpages"></div>
</div>

<script>
let data=[];

function addRow(){
 data.push({d:'',q:1,p:0});
 render();
}

function render(){
 const body=document.getElementById('rows');
 body.innerHTML='';
 let subtotal=0;

 data.forEach((r,i)=>{
   const total=r.q*r.p;
   subtotal+=total;

   body.innerHTML+=`
   <tr>
    <td><input value="${r.d}" onchange="data[${i}].d=this.value"></td>
    <td><input type="number" value="${r.q}" onchange="data[${i}].q=parseFloat(this.value)||0;render()"></td>
    <td><input type="number" value="${r.p}" onchange="data[${i}].p=parseFloat(this.value)||0;render()"></td>
    <td>${fmt(total)}</td>
    <td><button type="button" onclick="removeRow(${i})">Delete</button></td>
   </tr>`;
 });

 const vat=subtotal*0.07;
 const grand=subtotal+vat;

 document.getElementById('subtotal').innerText=fmt(subtotal);
 document.getElementById('vat').innerText=fmt(vat);
 document.getElementById('grand').innerText=fmt(grand);
}

function fmt(v){
 return new Intl.NumberFormat('en-US',{style:'currency',currency:'THB'}).format(v);
}

function removeRow(i){
 if(data.length===1){
  data[0]={d:'',q:1,p:0};
 }else{
  data.splice(i,1);
 }
 render();
}

function digitsOnly(v,maxLen){
 return v.replace(/\D/g,'').slice(0,maxLen);
}

function formatPhone(v){
 const d=digitsOnly(v,11);
 if(d.length<=3) return d;
 if(d.length<=6) return `${d.slice(0,3)}-${d.slice(3)}`;
 return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6,10)}`;
}

document.getElementById('phone').addEventListener('input',e=>{
 e.target.value=formatPhone(e.target.value);
});

document.getElementById('taxid').addEventListener('input',e=>{
 e.target.value=digitsOnly(e.target.value,13);
});

function preview(){
 let subtotal=0;
 const rowsPerPage=6;
 const pdfpages=document.getElementById('pdfpages');
 pdfpages.innerHTML='';

 data.forEach(r=>{
   subtotal+=r.q*r.p;
 });

 const grand=subtotal*1.07;
 const totalPages=Math.max(1,Math.ceil(data.length/rowsPerPage));

 for(let p=0;p<totalPages;p++){
  const start=p*rowsPerPage;
  const end=start+rowsPerPage;
  const chunk=data.slice(start,end);
  const rowsHtml=chunk.map(r=>{
   const t=r.q*r.p;
   return `<tr>
   <td>${r.d}</td>
   <td>${r.q}</td>
   <td>${fmt(r.p)}</td>
   <td>${fmt(t)}</td>
   </tr>`;
  }).join('');
  const isLastPage=p===totalPages-1;

  pdfpages.innerHTML+=`
  <div class="pdf-page">
  <table
  class="pdf-item-table"
  style="
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  "
  >
  <thead>
  <tr>
  <th>Description</th>
  <th>Qty</th>
  <th>Unit Price</th>
  <th>Total</th>
  </tr>
  </thead>
  <tbody>${rowsHtml}</tbody>
  ${isLastPage?`<tfoot>
  <tr style="background:#1CB078;color:white">
  <td colspan="3">Grand Total (VAT Included)</td>
  <td>${fmt(grand)}</td>
  </tr>
  </tfoot>`:''}
  </table>

  ${isLastPage?`<div class="terms-sign" style="margin-top:50px;display:flex;justify-content:space-between;align-items:flex-start;gap:24px">
  <div>
  <b>Terms & Conditions</b><br>
  Validity: 30 Days<br>
  Payment Terms: 30 Days After Invoice
  </div>

  <div
  style="
  text-align:right;
  width:250px;
  margin-left:auto;
  ">
  <div
  style="
  border-top:2px solid #1CB078;
  padding-top:10px;
  ">
  <strong>Sunita</strong><br>

  <span style="font-size:13px">
  Supply Chain Manager - CHEETECH
  </span>
  </div>
  </div>
  </div>`:''}
  </div>`;
 }

 document.getElementById('qno').innerText='QT-'+new Date().toISOString().slice(0,10).replaceAll('-','');

 document.getElementById('custinfo').innerHTML=`
 <b>${customer.value}</b><br>
 ${company.value}<br>
 ${phone.value}<br>
 ${taxid.value}<br>
 ${address.value}`;

 window.print();
}

addRow();
</script>
</body>
</html>
